<!DOCTYPE html>
<!-- 가락몰 실내 길찾기 웹앱 (프로토타입) / 생성일: 2026-06-25 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일 세로 화면 우선 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>가락몰 길찾기</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- 상단 헤더: 앱명 + 현재 위치 칩 -->
    <header class="app-header">
      <h1>🥬 가락몰 길찾기</h1>
      <span id="currentLocName" class="loc-chip">위치 확인 중…</span>
    </header>

    <main>
      <!-- 1) 입력 영역 -->
      <section class="input-section">
        <!-- 무농이 말풍선 안내 -->
        <div class="mascot-say intro">
          <img class="mascot" src="assets/munongi.png" alt="친환경무농이" />
          <p class="bubble">무엇을 사러 오셨나요?<br /><small>말하거나 버튼을 눌러주세요</small></p>
        </div>

        <!-- 음성 입력: 화면 가운데 큰 원형 마이크 버튼 -->
        <div class="voice-wrap">
          <button id="voiceBtn" class="mic-btn" type="button" aria-label="음성으로 말하기">
            <!-- 마이크 아이콘 (SVG) -->
            <svg viewBox="0 0 24 24" width="56" height="56" fill="none"
                 stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="2" width="6" height="12" rx="3" fill="#fff" stroke="none"/>
              <path d="M5 10v1a7 7 0 0 0 14 0v-1"/>
              <line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
          <p class="mic-label">눌러서 말하기</p>
        </div>
        <!-- 음성 상태 메시지 (동적, 평소 비어있음) -->
        <p id="voiceStatus" class="voice-status"></p>

        <!-- 카테고리 터치 버튼 (음성 실패/소음 대비 항상 제공) -->
        <div id="categoryButtons" class="category-buttons">
          <!-- app.js 에서 동적 생성 -->
        </div>
      </section>

      <!-- 2) 결과 카드 -->
      <section id="resultCard" class="result-card hidden">
        <!-- app.js 에서 채움 -->
      </section>

      <!-- 3) 지도 (공식 평면도 배경 SVG) — 입력(음성/버튼) 후에만 표시 -->
      <section class="map-section hidden">
        <div class="map-toolbar">
          <span id="mapTitle" class="floor-label">평면도</span>
          <div id="floorTabs" class="floor-tabs"><!-- 층 탭 동적 생성 --></div>
        </div>
        <div class="map-wrap">
          <svg id="mapSvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
               xmlns="http://www.w3.org/2000/svg" role="img" aria-label="가락몰 평면도">
            <!-- 평면도/마커/경로는 app.js 에서 그립니다 -->
          </svg>
        </div>
        <div class="map-legend">
          <span><i class="dot cur"></i> 현재위치</span>
          <span><i class="dot dest"></i> 목적지</span>
          <span><i class="dot route"></i> 이동 경로</span>
        </div>
        <!-- 하단 HUD 방향 배지: 목적지 상대 방향 -->
        <div id="hudBadge" class="hud-badge hidden">
          <span class="hud-arrow">⬆</span>
          <span class="hud-text">화살표 방향으로 가세요</span>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <small>서울시농수산식품공사 공공데이터 기반 · 프로토타입 (QR 위치 기준 안내)</small>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
