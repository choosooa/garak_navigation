<!DOCTYPE html>
<!-- 가락몰 실내 길찾기 웹앱 (프로토타입) / 생성일: 2026-06-25 -->
<!-- 3단계 흐름: ① 품목 입력 → ② 가게 선택 → ③ 네비게이션 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일 세로 화면 우선 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>가락몰 길찾기</title>
  <link rel="stylesheet" href="styles.css?v=9" />
</head>
<body>
  <div id="app">
    <!-- 상단 헤더: 앱명 + 현재 위치 칩 -->
    <header class="app-header">
      <h1>🥬 가락몰 길찾기</h1>
      <span id="currentLocName" class="loc-chip">위치 확인 중…</span>
    </header>

    <main>
      <!-- ═══ 1단계: 품목 입력 ═══ -->
      <section id="stepInput" class="step-view">
        <!-- 무농이 말풍선 안내 -->
        <div class="mascot-say intro">
          <img class="mascot" src="assets/munongi.png" alt="친환경무농이" />
          <p class="bubble">무엇을 사러 오셨나요?<br /><small>말하거나 버튼을 눌러주세요</small></p>
        </div>

        <!-- 음성 입력: 화면 가운데 큰 원형 마이크 버튼 -->
        <div class="voice-wrap">
          <button id="voiceBtn" class="mic-btn" type="button" aria-label="음성으로 말하기">
            <svg viewBox="0 0 24 24" width="56" height="56" fill="none"
                 stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="2" width="6" height="12" rx="3" fill="#fff" stroke="none"/>
              <path d="M5 10v1a7 7 0 0 0 14 0v-1"/>
              <line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
          <p class="mic-label">눌러서 말하기</p>
        </div>
        <p id="voiceStatus" class="voice-status"></p>

        <!-- 카테고리 터치 버튼 (음성 실패/소음 대비 항상 제공) -->
        <div id="categoryButtons" class="category-buttons"></div>
      </section>

      <!-- ═══ 2단계: 가게 선택 ═══ -->
      <section id="stepSelect" class="step-view hidden">
        <div class="mascot-say">
          <img id="selectMascot" class="mascot" src="assets/munongi.png" alt="안내 캐릭터" />
          <p class="bubble" id="selectBubble">어느 가게로 안내할까요?</p>
        </div>
        <p class="select-hint" id="selectHint"></p>
        <div id="storeList" class="store-list"><!-- app.js 에서 채움 --></div>
        <button id="backToInput" class="big-back" type="button">← 다른 품목 찾기</button>
      </section>

      <!-- ═══ 3단계: 네비게이션 ═══ -->
      <section id="stepNav" class="step-view hidden">
        <!-- 목적지 배너 (네비게이션 상단) -->
        <div class="nav-banner">
          <div class="nav-dest">
            <span class="nav-dest-label">목적지</span>
            <strong id="navDestName">-</strong>
          </div>
          <button id="trackBtn" class="tts-btn" type="button" aria-label="걸음 따라가기 켜기/끄기">👣</button>
          <button id="ttsBtn" class="tts-btn" type="button" aria-label="음성 안내 켜기/끄기">🔊</button>
        </div>

        <!-- 지도: 주행 시점(1인칭, 기본) / 전체 지도 토글 -->
        <div class="map-card">
          <div class="map-toolbar">
            <span id="mapTitle" class="floor-label">평면도</span>
            <div class="view-toggle">
              <button id="mode3dBtn" type="button" class="active">🧭 주행 시점</button>
              <button id="mode2dBtn" type="button">🗺️ 전체 지도</button>
            </div>
            <div id="floorTabs" class="floor-tabs"></div>
          </div>
          <div class="map-stage" id="mapStage">
            <div class="fp-tilt" id="fpTilt">
              <svg id="mapSvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
                   xmlns="http://www.w3.org/2000/svg" role="img" aria-label="가락몰 평면도"></svg>
            </div>
          </div>
          <div class="map-legend">
            <span><i class="dot cur"></i> 현재위치</span>
            <span><i class="dot dest"></i> 목적지</span>
            <span><i class="dot route"></i> 이동 경로</span>
          </div>
        </div>

        <div class="nav-actions">
          <button id="backToSelect" class="big-back" type="button">← 다른 가게 선택</button>
          <button id="restartBtn" class="big-back home" type="button">🏠 처음으로</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <small>서울시농수산식품공사 공공데이터 기반 · 프로토타입 (QR 위치 기준 안내)</small>
    </footer>
  </div>

  <script src="vendor/three.min.js"></script>
  <script src="app.js?v=10"></script>
</body>
</html>
