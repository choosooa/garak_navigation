<!DOCTYPE html>
<!-- 가락몰 실내 길찾기 웹앱 (프로토타입) / 생성일: 2026-06-25 -->
<!-- 3단계 흐름: ① 품목 입력 → ② 가게 선택 → ③ 네비게이션 -->
<!-- UI: design_handoff_garakmall_wayfinding/mockup.html 기준 리디자인 (2026-07-07) -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일 세로 화면 우선. 고령 사용자를 위해 핀치 줌 허용, iOS 노치/홈바 영역 반영(safe-area) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>가락몰 길찾기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="styles.css?v=47" />
</head>
<body>
  <div id="app">
    <main>
      <!-- ═══ 1단계: 품목 입력 ═══ -->
      <section id="stepInput" class="step-view">
        <!-- 헤더: 앱명 + 현재 위치 칩 (화면 1에서만 표시) -->
        <header class="s1-header">
          <span class="s1-appname"><span class="logo">🥬</span> 가락몰 길찾기</span>
          <span id="currentLocName" class="loc-chip">위치 확인 중…</span>
        </header>

        <!-- 무농이 말풍선 안내 -->
        <div class="mascot-row">
          <img class="mascot" src="assets/munongi.png" alt="친환경무농이" />
          <p class="bubble bubble-title">무엇을 사러 오셨나요?</p>
        </div>

        <!-- 1순위: 음성 (라벨이 버튼 안에 포함) -->
        <div class="s1-voice">
          <button id="voiceBtn" class="mic-btn" type="button" aria-label="음성으로 말하기">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none"
                 stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="2" width="6" height="12" rx="3" fill="#fff" stroke="none"/>
              <path d="M5 11a7 7 0 0 0 14 0"/>
              <line x1="12" y1="18" x2="12" y2="21"/>
            </svg>
            <span class="mic-label">눌러서 말하기</span>
          </button>
        </div>
        <p id="voiceStatus" class="voice-status"></p>

        <!-- 2순위: 텍스트 검색 -->
        <form id="searchForm" class="s1-search">
          <div class="search-box">
            <span class="search-ico">🔍</span>
            <input id="searchInput" type="search" placeholder="품목 입력 (예: 사과, 갈치)"
                   autocomplete="off" enterkeyhint="search" />
          </div>
          <button type="submit" class="btn-green">검색</button>
        </form>

        <!-- 3순위: 카테고리 -->
        <div class="s1-cats">
          <div class="s1-cats-label">카테고리에서 고르기</div>
          <div id="categoryButtons" class="cat-grid"></div>
        </div>
      </section>

      <!-- ═══ 2단계: 가게 선택 ═══ -->
      <section id="stepSelect" class="step-view hidden">
        <button id="backToInput" class="back-chip" type="button">← 다른 품목 찾기</button>
        <div class="mascot-row">
          <img id="selectMascot" class="mascot mascot-sm" src="assets/munongi.png" alt="안내 캐릭터" />
          <p class="bubble" id="selectBubble">어느 가게로 안내할까요?</p>
        </div>
        <p class="s2-note" id="selectHint"></p>
        <div id="storeList" class="store-list"><!-- app.js 에서 채움 --></div>
      </section>

      <!-- ═══ 3단계: 네비게이션 ═══ -->
      <!-- 지도가 화면 전체. 안내 바·버튼은 지도 위 오버레이 (음성 TTS 병행) -->
      <section id="stepNav" class="step-view hidden">
        <div class="map-stage" id="mapStage">
          <!-- tilt-layer: 벡터 지도 층에서만 2.5D 기울임(rotateX) 적용 -->
          <div class="tilt-layer">
            <svg id="mapSvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
                 xmlns="http://www.w3.org/2000/svg" role="img" aria-label="가락몰 평면도"></svg>
          </div>
        </div>
        <!-- 상단 오버레이: 큰 안내 바(지금 할 일) + 칩·토글 -->
        <div class="nav-top">
          <div class="instr going" id="instrBar">
            <div class="icon" id="guideIcon">⬆</div>
            <div class="instr-text">
              <span class="main" id="guideText">안내를 시작합니다</span>
              <span class="next" id="guideNext"></span>
            </div>
          </div>
          <div class="nav-chips">
            <div class="chip-row">
              <button id="backToSelect" class="nav-chip" type="button">← 다른 가게</button>
              <button id="restartBtn" class="nav-chip" type="button">🏠 처음</button>
              <button id="mapModeBtn" class="nav-chip" type="button">🗺 전체 지도</button>
            </div>
            <div class="chip-row">
              <button id="trackBtn" class="toggle on" type="button" aria-label="위치 따라가기 켜기/끄기">📍</button>
              <button id="ttsBtn" class="toggle on" type="button" aria-label="음성 안내 켜기/끄기">🔊</button>
            </div>
          </div>
        </div>
        <!-- 확대/축소 버튼 — 전체 지도 모드에서만 표시 (핀치 제스처 대체, 고령 사용자 배려) -->
        <div id="zoomBtns" class="zoom-btns hidden">
          <button id="zoomInBtn" type="button" aria-label="확대">＋</button>
          <button id="zoomOutBtn" type="button" aria-label="축소">－</button>
        </div>
        <!-- 하단: 층간 이동/안내 종료 큰 버튼 + 층탭 -->
        <div class="nav-bottom">
          <button id="floorGoBtn" class="floor-cta hidden" type="button"></button>
          <div id="floorTabs" class="floor-tabs"></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <small>서울시농수산식품공사 공공데이터 기반 · 프로토타입 (QR 위치 기준 안내)</small>
    </footer>
  </div>

  <script src="app.js?v=47"></script>
</body>
</html>
